services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      # Consumed by deploy/initdb/10-ai-roles.sh to provision the AI roles + DB.
      AI_READONLY_PASSWORD: ${AI_READONLY_PASSWORD:-ai_readonly_pass}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-ai_db_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs ONCE on first cluster init: creates ai_user + ai_appdb + ai_readonly
      # so an AI service run separately against this DB can connect.
      - ./deploy/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      args:
        BUILD_ENV: ${BUILD_ENV:-development}
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
    volumes:
      - .:/app
      - /app/.venv  # or wherever your venv/site-packages live, see note below
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: