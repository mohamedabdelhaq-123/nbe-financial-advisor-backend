[tool.ruff]
line-length = 100
exclude = ["**/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.black]
line-length = 100
# Black normally skips gitignored paths (.venv/ included) automatically, but
# that detection needs `git` on PATH — absent from the backend/celery-worker
# container images, where it then silently falls back to scanning everything
# under `.`, including the multi-hundred-MB .venv volume. Excluded explicitly
# here so the check doesn't depend on git being available wherever it runs.
exclude = '''
/(
    migrations
    | \.venv
)/
'''

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
testpaths = ["tests"]
markers = [
    "integration: hits a real SeaweedFS instance, not run by default (see docs/Environment_Profiles.md) — run with `pytest -m integration` against a running docker-compose stack",
]
