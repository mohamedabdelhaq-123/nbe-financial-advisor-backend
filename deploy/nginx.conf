server {
  listen 80;

  # frontend SPA
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # OpenAPI docs/schema/redoc — passed through with the /api/ prefix intact,
  # unlike /api/ below (which strips it). These pages embed a browser-
  # fetchable link back to the schema (reverse()'d from Django's own urlconf,
  # which registers these three routes WITH "api/" baked in for exactly this
  # reason — config/urls.py) that the browser re-requests as an independent
  # second hop; stripping the prefix here would 404 that follow-up request
  # (nginx matches the longest prefix location regardless of block order, so
  # these take precedence over /api/ below without needing regex).
  location /api/schema/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /api/docs/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /api/redoc/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # backend API — strip the /api prefix before forwarding
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # SSE (single multiplexed connection, core/views/events.py) — long-lived,
  # so buffering/caching must be off or events queue up instead of
  # streaming, and the read timeout needs to be long, not nginx's default.
  # nginx matches the longest prefix location regardless of block order, so
  # this takes precedence over /api/ above for anything under /api/events/.
  location /api/events/ {
    proxy_pass http://backend:8000/events/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
  }

  # NOTE: no /ai route on purpose — the AI service stays private (Pattern A)
  # It is only reachable by the backend container via the Docker network.
}
