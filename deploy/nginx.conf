server {
  listen 80;

  # frontend SPA
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # backend API — strip the /api prefix before forwarding
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # NOTE: no /ai route on purpose — the AI service stays private (Pattern A)
  # It is only reachable by the backend container via the Docker network.
}
