services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"                     # changed from 80 (already in use on this host)
    depends_on: [frontend, backend]

  frontend:
    build:
      context: ../../nbe-financial-advisor-frontend
      dockerfile: Dockerfile.prod
    expose: ["80"]                    # internal only

  backend:
    build:
      context: ..
      args:
        BUILD_ENV: production
    command: >
      sh -c "python manage.py migrate &&
            gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
    expose: ["8000"]                  # internal only — reached via nginx /api/
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build: ../../nbe-financial-advisor-ai-service
    # Alembic runs AFTER backend is healthy => Django's tables already exist.
    # M7 hardening: upgrade depends_on to a dedicated backend-migrate one-shot
    # service with condition: service_completed_successfully for a hard guarantee.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-1}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-__mock__}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
    expose: ["8001"]                  # internal only, NEVER published — Pattern A
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started    # backend starts (runs its migrate) before AI service

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest    # verified: sha256:e1ee85a3...
    command: "server -dir=/data -master.volumeSizeLimitMB=1024"
    volumes:
      - seaweed_data:/data              # named volume — files persist across restarts
    expose:
      - "8333"                          # S3 API  (internal only — Pattern A)
      - "9333"                          # master
      - "8080"                          # volume server
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9333/cluster/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinerU — PARKED, pending AI Specialist input ──────────────────────────
  # There is NO official MinerU image on Docker Hub. The project team explicitly
  # does not publish to Docker Hub. Options:
  #   A) Build from their Dockerfile: https://github.com/opendatalab/MinerU
  #      Requires GPU with Volta+ architecture and ≥8 GB VRAM.
  #   B) Use pip install magic-pdf inside a Python base image (CPU mode, slower).
  # Uncomment and fill in once the AI Specialist decides the approach.
  #
  # mineru:
  #   image: <to-be-decided by AI Specialist>
  #   expose:
  #     - "8000"                        # internal only — Pattern A
  #   restart: unless-stopped

  # ── vLLM (PARKED — enable when a GPU machine is available) ──────────────
  # Serves the real model with an OpenAI-compatible API. Requires a GPU +
  # nvidia-container-toolkit on the host. Until then, the AI service uses
  # mock mode / OpenAI (USE_MOCK_LLM). Enabling this is CONFIG ONLY — no code changes.
  #
  # vllm:
  #   image: vllm/vllm-openai:latest        # ⚠️ PIN an exact tag/digest before real use
  #   command: ["--model", "${MODEL_NAME}"]  # e.g. a model that fits the GPU's VRAM
  #   volumes:
  #     - ./models:/models                   # pre-fetched weights (offline prod can't download)
  #   expose:
  #     - "8000"                             # internal only — never published (Pattern A)
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 300s                   # weights take minutes to load

volumes:
  pgdata:
  seaweed_data:
  # models:                                  # uncomment with vllm service above
