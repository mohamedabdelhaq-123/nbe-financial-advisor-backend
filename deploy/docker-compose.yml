services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"                     # changed from 80 (already in use on this host)
    depends_on: [frontend, backend]

  frontend:
    build:
      context: ../../nbe-financial-advisor-frontend
      dockerfile: Dockerfile.prod
    expose: ["80"]                    # internal only

  backend:
    build:
      context: ..
      args:
        BUILD_ENV: production
    # --worker-class gthread --timeout 0: the single multiplexed SSE
    # connection (core/views/events.py's GET /events/stream) is long-lived
    # and would otherwise occupy an entire sync worker for its lifetime and
    # get SIGKILL'd by gunicorn's default 30s request timeout.
    command: >
      sh -c "python manage.py migrate &&
            python manage.py ensure_storage_buckets &&
            python manage.py seed_onboarding_templates &&
            gunicorn config.wsgi:application --bind 0.0.0.0:8000
            --worker-class gthread --workers 2 --threads 4 --timeout 0"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      # Consumed by core/migrations/0009_grant_ai_readonly_role.py to
      # provision/refresh the ai_readonly role's password.
      AI_READONLY_PASSWORD: ${AI_READONLY_PASSWORD:-ai_readonly_pass}
      SEAWEED_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEED_ACCESS_KEY: ${SEAWEED_ACCESS_KEY}
      SEAWEED_SECRET_KEY: ${SEAWEED_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    expose: ["8000"]                  # internal only — reached via nginx /api/
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ..
      args:
        BUILD_ENV: production
    command: sh -c "celery -A config worker --loglevel=info --concurrency=2"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      AI_READONLY_PASSWORD: ${AI_READONLY_PASSWORD:-ai_readonly_pass}
      SEAWEED_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEED_ACCESS_KEY: ${SEAWEED_ACCESS_KEY}
      SEAWEED_SECRET_KEY: ${SEAWEED_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    # Overrides the image's baked-in HEALTHCHECK (Dockerfile hits
    # localhost:8000/health/, which nothing serves here) with a
    # Celery-native worker ping — same fix as docker-compose.yml's
    # celery-worker service.
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    expose: ["6379"]                  # internal only — Pattern A
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ../../nbe-financial-advisor-ai-service
      target: prod
    # Alembic runs AFTER backend is healthy => Django's tables already exist.
    # M7 hardening: upgrade depends_on to a dedicated backend-migrate one-shot
    # service with condition: service_completed_successfully for a hard guarantee.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001"
    environment:
      # Own (read-write) database — a SEPARATE database (ai_appdb) owned by a
      # dedicated least-privilege role. The AI service migrates & owns these
      # tables; it holds NO superuser creds and cannot touch Django's appdb.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${AI_DB_NAME:-ai_appdb}
      POSTGRES_USER: ${AI_DB_USER:-ai_user}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-ai_db_pass}
      # Backend (Django-owned) database — READ-ONLY role, SELECT only.
      # Same Postgres server, but appdb via a locked-down role so writes are
      # rejected by the DB itself.
      BACKEND_DB_HOST: postgres
      BACKEND_DB_PORT: 5432
      BACKEND_DB_NAME: ${POSTGRES_DB:-appdb}
      BACKEND_DB_USER: ai_readonly
      BACKEND_DB_PASSWORD: ${AI_READONLY_PASSWORD:-ai_readonly_pass}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-1}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-__mock__}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      NORMALIZATION_MAX_PARALLEL_CHUNKS: ${NORMALIZATION_MAX_PARALLEL_CHUNKS:-1}
      NORMALIZATION_CHUNK_MAX_TOKENS: ${NORMALIZATION_CHUNK_MAX_TOKENS:-4096}
      # S3-compatible object storage — same SeaweedFS gateway the backend
      # uses, reusing its already-provisioned SEAWEED_* credentials/env vars.
      STORAGE_S3_BUCKET: ${AI_STORAGE_BUCKET:-pfm-statements-normalized}
      STORAGE_S3_ENDPOINT_URL: http://seaweedfs:8333
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${SEAWEED_ACCESS_KEY}
      STORAGE_S3_SECRET_KEY: ${SEAWEED_SECRET_KEY}
      STORAGE_S3_USE_PATH_STYLE: "true"
      STORAGE_S3_OCR_BUCKET: ${AI_STORAGE_OCR_BUCKET:-pfm-statements-ocr}
      # MinerU document processing — real service is PARKED (see below), so
      # this stays mocked until an image/approach is chosen.
      USE_MOCK_MINERU: ${USE_MOCK_MINERU:-1}
      MINERU_API_URL: ${MINERU_API_URL:-http://mineru:8000}
      MINERU_API_KEY: ${MINERU_API_KEY:-key}
    expose: ["8001"]                  # internal only, NEVER published — Pattern A
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      backend:
        condition: service_started    # backend starts (runs its migrate) before AI service

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppass}
      # Consumed by initdb/10-ai-roles.sh to provision ai_user + ai_appdb.
      # ai_readonly is provisioned separately by a Django migration (see
      # core/migrations/0009_grant_ai_readonly_role.py), which reads
      # AI_READONLY_PASSWORD from the backend service's own environment above.
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-ai_db_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs ONCE on first cluster init: creates ai_user + ai_appdb.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    # -s3/-filer are required for the S3 gateway to actually come up — without
    # them nothing listens on 8333 despite it being exposed below (PLAN.md
    # Checkpoint 1: this was silently broken before, verified by hand against
    # the real image).
    command: "server -dir=/data -master.volumeSizeLimitMB=1024 -filer -s3 -s3.port=8333"
    volumes:
      - seaweed_data:/data              # named volume — files persist across restarts
    expose:
      - "8333"                          # S3 API  (internal only — Pattern A)
      - "9333"                          # master
      - "8080"                          # volume server
    healthcheck:
      # 127.0.0.1, not localhost: this image's busybox wget resolves
      # "localhost" to ::1 first and doesn't fall back to IPv4, so the
      # healthcheck never passes if written the more obvious way (verified
      # by hand — PLAN.md Checkpoint 1).
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinerU — PARKED, pending AI Specialist input ──────────────────────────
  # There is NO official MinerU image on Docker Hub. The project team explicitly
  # does not publish to Docker Hub. Options:
  #   A) Build from their Dockerfile: https://github.com/opendatalab/MinerU
  #      Requires GPU with Volta+ architecture and ≥8 GB VRAM.
  #   B) Use pip install magic-pdf inside a Python base image (CPU mode, slower).
  # Uncomment and fill in once the AI Specialist decides the approach.
  #
  # mineru:
  #   image: <to-be-decided by AI Specialist>
  #   expose:
  #     - "8000"                        # internal only — Pattern A
  #   restart: unless-stopped

  # ── vLLM (PARKED — enable when a GPU machine is available) ──────────────
  # Serves the real model with an OpenAI-compatible API. Requires a GPU +
  # nvidia-container-toolkit on the host. Until then, the AI service uses
  # mock mode / OpenAI (USE_MOCK_LLM). Enabling this is CONFIG ONLY — no code changes.
  #
  # vllm:
  #   image: vllm/vllm-openai:latest        # ⚠️ PIN an exact tag/digest before real use
  #   command: ["--model", "${MODEL_NAME}"]  # e.g. a model that fits the GPU's VRAM
  #   volumes:
  #     - ./models:/models                   # pre-fetched weights (offline prod can't download)
  #   expose:
  #     - "8000"                             # internal only — never published (Pattern A)
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 300s                   # weights take minutes to load

volumes:
  pgdata:
  seaweed_data:
  # models:                                  # uncomment with vllm service above
